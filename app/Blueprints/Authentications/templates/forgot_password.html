<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ContentPro | Forgot Password</title>
  <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='assets/img/logo_1.png') }}">

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="{{ url_for('static', filename='plugins/fontawesome-free/css/all.min.css')}}">
    <!-- Font Awesome Pro v7.0.0 -->
  <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome-pro/css/all.css') }}">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="{{ url_for('static', filename='plugins/icheck-bootstrap/icheck-bootstrap.min.css')}}">
  <!-- Theme style -->
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/css/adminlte.min.css')}}">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-header align-content-center">
      <img src="{{ url_for('static', filename='assets/img/infocontent_logo.png')}}" style="width: 300px; height: auto;" alt="Logo">
    </div>
    <div class="card-body">
      <h3 class="text-center">Forgot Password?</h3>
      <p >Enter your email and we'll send you instructions to reset your password.</p>
<form id="forgot_password_form">
  <div class="input-group mb-3">
    <input type="email" class="form-control" id="email" name="email" placeholder="Email" required autofocus>
    <div class="input-group-append">
      <div class="input-group-text">
        <span class="fas fa-envelope"></span>
      </div>
    </div>
  </div>

  <div class="text-center mb-3">
  <span id="email_feedback" class="d-block text-danger d-none"></span>
</div>
  <div class="row">
    <div class="col-12">
      <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
    </div>
  </div>
</form>
    <p class="mt-3 mb-1">
      <a href="/sys/logout" class="text-decoration-none d-inline-flex align-items-center">
        <i class="fa-regular fa-angle-left me-1"></i>
        <span>Back to login</span>
      </a>
    </p>
    </div>
    <!-- /.login-card-body -->
  </div>
</div>
<!-- /.login-box -->

<!-- jQuery -->
<script src="{{ url_for('static', filename='plugins/jquery/jquery.min.js')}}"></script>
<!-- Bootstrap 4 -->
<script src="{{ url_for('static', filename='plugins/bootstrap/js/bootstrap.bundle.min.js')}}"></script>
<!-- AdminLTE App -->
<script src="{{ url_for('static', filename='dist/js/adminlte.min.js')}}"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.querySelector('form'); // adjust if needed
  const emailInput = document.getElementById('email');
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    if (!email) {
      emailInput.focus();
      return;
    }

    // Disable button + change text
    submitBtn.disabled = true;
    const originalText = submitBtn.innerText;
    submitBtn.innerText = 'Sending...';

    const formData = new FormData();
    formData.append('email', email);

    try {
      await fetch('/sys/forgot_password', {
        method: 'POST',
        body: formData
      });

      // Clear form before redirect
      form.reset();

      // Always redirect (do not reveal success/failure)
      window.location.href = '/sys/verify_email';

    } catch (err) {
      console.error(err);

      // Restore button only if request truly fails
      submitBtn.disabled = false;
      submitBtn.innerText = originalText;

      alert('Something went wrong. Please try again later.');
    }
  });
});
</script>

</body>
</html>
